name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 217.216.92.134
          port: 22
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 60s
          command_timeout: 30m
          script: |
            cd /var/www/html/absloja
            if [ -f wp-config.php ]; then cp wp-config.php /tmp/wp-config.php.deploy-backup; fi
            git pull origin main
            if [ ! -f wp-config.php ] && [ -f /tmp/wp-config.php.deploy-backup ]; then
              mv /tmp/wp-config.php.deploy-backup wp-config.php
              chown www-data:www-data wp-config.php
              chmod 640 wp-config.php
            fi
            echo "✅ Deploy concluído!"
